<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simon a 40 ans — Marrakech</title>
<meta name="description" content="Espace privé pour les invités du séjour à Marrakech.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<main class="card">
  <div class="motif motif-top" aria-hidden="true">✦ ✦ ✦ ✦ ✦</div>

  <p class="eyebrow">Marrakech · 24 juillet 2026</p>
  <h1>Simon a 40 ans</h1>

  <div class="divider" aria-hidden="true"><span></span>◆<span></span></div>

  <div id="gate-view">
    <p class="lead">Cet espace est réservé aux invités du séjour.<br>Entre le mot de passe pour accéder au dossier partagé.</p>

    <form id="password-form" novalidate>
      <label class="field">
        <span>Mot de passe</span>
        <input type="password" id="password-input" name="password" autocomplete="off" required>
      </label>
      <button type="submit" class="btn">Accéder</button>
      <p class="error" id="error-msg" role="alert"></p>
    </form>
  </div>

  <div id="unlocked-view" hidden>
    <p class="lead">C'est bon, bienvenue ! 🎉<br>Dépose (ou récupère) les photos et vidéos du séjour ici :</p>
    <a class="btn btn-drive" id="drive-link" href="#" target="_blank" rel="noopener">📁 Ouvrir le dossier Drive</a>
  </div>

  <div class="motif motif-bottom" aria-hidden="true">✦ ✦ ✦ ✦ ✦</div>
</main>

<script src="app.js"></script>
</body>
</html>
